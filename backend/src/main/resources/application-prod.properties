# Production configuration for Render deployment
# These values are overridden by environment variables set in Render dashboard

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Use 'update' for first deploy, then switch to 'validate'
spring.jpa.hibernate.ddl-auto=update

app.jwt.secret=${APP_JWT_SECRET:TechLogoQuizSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm}
app.jwt.expiration=86400000

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://your-app.netlify.app}

server.port=${PORT:8080}
