# ============================================================
# Tech Logo Quiz - Application Configuration
# ============================================================

spring.application.name=tech-logo-quiz

# --- Database ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=${PORT:8080}
server.servlet.context-path=/api

# --- JWT ---
app.jwt.secret=TechLogoQuizSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# --- CORS (update with your frontend URL for production) ---
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://tech-logo-quiz.onrender.com,https://your-frontend.netlify.app

# --- Logging ---
logging.level.com.techquiz=INFO
logging.level.org.springframework.security=WARN
