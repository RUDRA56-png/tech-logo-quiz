spring.application.name=tech-logo-quiz

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/tech_logo_quiz?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rudra123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=8080
server.servlet.context-path=/api

# --- JWT ---
app.jwt.secret=TechLogoQuizSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# --- CORS (update with your frontend URL for production) ---
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://your-frontend.netlify.app

# --- Logging ---
logging.level.com.techquiz=INFO
logging.level.org.springframework.security=WARN
